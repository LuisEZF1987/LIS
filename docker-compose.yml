x-common: &common
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  postgres:
    <<: *common
    image: postgres:16-alpine
    container_name: dimed-lis-postgres
    environment:
      POSTGRES_USER: ${PG_USER:-dimed}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-dimed_lis}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${PG_EXT_PORT:-5434}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-dimed} -d ${DB_NAME:-dimed_lis}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  init:
    image: postgres:16-alpine
    container_name: dimed-lis-init
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-dimed_lis}
      PG_USER: ${PG_USER:-dimed}
      PG_PASSWORD: ${PG_PASSWORD}
    volumes:
      - ./migrations:/migrations:ro
      - ./scripts:/scripts:ro
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        export PGPASSWORD="$$PG_PASSWORD"
        PSQL="psql -h $$DB_HOST -p $$DB_PORT -U $$PG_USER -d $$DB_NAME -v ON_ERROR_STOP=1"
        $$PSQL -c "CREATE TABLE IF NOT EXISTS lis_migrations (id SERIAL PRIMARY KEY, filename VARCHAR(200) UNIQUE NOT NULL, applied_at TIMESTAMPTZ DEFAULT NOW());" 2>/dev/null
        for sql_file in /migrations/[0-9]*.sql; do
          [ -f "$$sql_file" ] || continue
          fname=$$(basename "$$sql_file")
          already=$$($$PSQL -t -c "SELECT COUNT(*) FROM lis_migrations WHERE filename='$$fname'" 2>/dev/null | tr -d ' ')
          if [ "$$already" -gt 0 ]; then continue; fi
          echo "Aplicando: $$fname"
          $$PSQL -f "$$sql_file"
          $$PSQL -c "INSERT INTO lis_migrations(filename) VALUES('$$fname')"
        done
        echo "Migraciones completadas."
    restart: "no"
    networks:
      - backend

  lis:
    <<: *common
    build: ./lis
    container_name: dimed-lis-core
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      GH_DB_NAME: ${DB_NAME:-dimed_lis}
      PG_USER: ${PG_USER:-dimed}
      PG_PASSWORD: ${PG_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      LIS_PORT: "9008"
      INSTITUTION_NAME: ${SRI_RAZON_SOCIAL:-Laboratorio}
      INSTITUTION_RUC: ${SRI_RUC:-}
      INSTITUTION_ADDRESS: ${SRI_DIRECCION_MATRIZ:-}
      INSTITUTION_PHONE: ${INSTITUTION_PHONE:-}
      LOGO_PATH: /certs/logo.png
    volumes:
      - ./certs:/certs:ro
    depends_on:
      postgres:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    networks:
      - backend

  billing:
    <<: *common
    build: ./billing
    container_name: dimed-lis-billing
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-dimed_lis}
      PG_USER: ${PG_USER:-dimed}
      PG_PASSWORD: ${PG_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      BILLING_PORT: "9009"
      SRI_AMBIENTE: ${SRI_AMBIENTE:-1}
      SRI_RUC: ${SRI_RUC:-}
      SRI_RAZON_SOCIAL: ${SRI_RAZON_SOCIAL:-}
      SRI_NOMBRE_COMERCIAL: ${SRI_NOMBRE_COMERCIAL:-}
      SRI_DIRECCION_MATRIZ: ${SRI_DIRECCION_MATRIZ:-}
      SRI_CERT_PATH: ${SRI_CERT_PATH:-}
      SRI_CERT_PASSWORD: ${SRI_CERT_PASSWORD:-}
      LOGO_PATH: /certs/logo.png
    volumes:
      - ./certs:/certs:ro
    depends_on:
      postgres:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    networks:
      - backend

  web:
    <<: *common
    build: ./web
    container_name: dimed-lis-web
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-dimed_lis}
      PG_USER: ${PG_USER:-dimed}
      PG_PASSWORD: ${PG_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      LIS_URL: http://lis:9008
      BILLING_URL: http://billing:9009
      WEB_PORT: "9000"
    ports:
      - "${WEB_PORT:-9100}:9000"
    depends_on:
      lis:
        condition: service_started
      billing:
        condition: service_started
      init:
        condition: service_completed_successfully
    networks:
      - backend

volumes:
  pgdata:

networks:
  backend:
    driver: bridge
