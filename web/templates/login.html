<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dimed-LIS — Iniciar Sesion</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>body{background:#020617;font-family:system-ui,sans-serif}</style>
</head>
<body class="min-h-screen flex items-center justify-center">
<div class="w-full max-w-sm mx-auto">
  <div class="text-center mb-8">
    <h1 class="text-2xl font-bold"><span class="text-white">Dimed</span><span class="text-blue-400">-LIS</span></h1>
    <p class="text-slate-400 text-sm mt-1">Sistema de Laboratorio</p>
  </div>
  <form id="loginForm" class="bg-slate-900/60 border border-slate-700 rounded-xl p-6 space-y-4">
    <div id="error" class="hidden bg-red-900/50 border border-red-700 text-red-300 text-sm rounded-lg p-3"></div>
    <div>
      <label class="block text-slate-300 text-sm mb-1">Usuario</label>
      <input id="username" type="text" required autofocus
        class="w-full bg-slate-800 border border-slate-600 text-white rounded-lg px-3 py-2 focus:outline-none focus:border-blue-500">
    </div>
    <div>
      <label class="block text-slate-300 text-sm mb-1">Contraseña</label>
      <input id="password" type="password" required
        class="w-full bg-slate-800 border border-slate-600 text-white rounded-lg px-3 py-2 focus:outline-none focus:border-blue-500">
    </div>
    <button type="submit"
      class="w-full bg-blue-600 hover:bg-blue-500 text-white font-medium rounded-lg py-2 transition-colors">
      Iniciar Sesion
    </button>
  </form>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const err = document.getElementById('error');
  err.classList.add('hidden');
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      })
    });
    const data = await res.json();
    if (!res.ok) { err.textContent = data.error || 'Error'; err.classList.remove('hidden'); return; }
    sessionStorage.setItem('user', JSON.stringify(data.user));
    window.location.href = data.redirect || '/app/dashboard';
  } catch(e) { err.textContent = 'Error de conexion'; err.classList.remove('hidden'); }
});
</script>
</body>
</html>
